# Deploy to PROD only when you run it manually (Actions → Deploy Production → Run workflow)
name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy-prod:
    name: Migrate and deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (production)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: python manage.py migrate --noinput

      - name: Deploy to production
        env:
          PROD_DEPLOY_SECRET: ${{ secrets.PROD_DEPLOY_SECRET }}
        run: |
          echo "Deploy to prod: add your command above (e.g. Railway, Render, Fly). Set PROD_DEPLOY_SECRET or other secrets as needed."
          if [ -n "$PROD_DEPLOY_SECRET" ]; then
            echo "PROD_DEPLOY_SECRET is set. Add your deploy command here."
          fi
