# Deploy to DEV on every push to main
name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    name: Migrate and deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub deployment record
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: dev
          environment-url: ${{ secrets.DEV_ENVIRONMENT_URL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (dev)
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: python manage.py migrate --noinput

      - name: Deploy to dev
        env:
          DEV_DEPLOY_WEBHOOK: ${{ secrets.DEV_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$DEV_DEPLOY_WEBHOOK" ]; then
            echo "Triggering dev deploy via webhook..."
            curl -fsS -X POST "$DEV_DEPLOY_WEBHOOK"
          else
            echo "DEV_DEPLOY_WEBHOOK not set. Add it in repo Secrets (Settings → Secrets → Actions) with your host's deploy webhook URL (e.g. Render Deploy Hook, Railway webhook) to enable automatic dev deploys."
          fi

      - name: Update deployment status
        if: always() && steps.deployment.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: ${{ job.status }}
